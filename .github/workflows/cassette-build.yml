name: Build Cassette Cross-Platform

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason'
        required: false
        default: 'Manual Building'
      qt_binding:
        description: 'Qt binding'
        required: false
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'pyqt5'
          - 'pyqt6'
      upload_to_draft_release:
        description: 'Upload build artifacts to draft release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux-x64
            sep: ":"

          - os: ubuntu-24.04-arm
            artifact_name: linux-arm64
            sep: ":"

          - os: windows-latest
            artifact_name: windows-x64

          - os: windows-11-arm
            artifact_name: windows-arm64

          - os: macos-15-intel
            artifact_name: macos-intel

          - os: macos-latest
            artifact_name: macos-silicon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Determine Qt Binding
        shell: bash
        run: |
          requested="${{ inputs.qt_binding }}"

          if [ "$requested" == "auto" ] || [ -z "$requested" ]; then
            if [ "${{ runner.os }}" == "Windows" ]; then
              effective="pyqt5"
            else
              effective="pyqt6"
            fi
          else
            effective="$requested"
          fi

          echo "QT_BINDING=$effective" >> "$GITHUB_ENV"
          echo "Effective Qt binding for ${{ runner.os }} (${{ runner.arch }}): $effective"

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools numpy pythran

      - name: Clone and build aubio
        run: |
          git clone https://github.com/aubio/aubio.git
          cd aubio
          python setup.py bdist_wheel
          cd ..

      - name: Switch to PyQt5
        if: env.QT_BINDING == 'pyqt5'
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          root = Path('.')
          skip_dirs = {'.git', '.venv', 'venv', '__pycache__', 'build', 'dist'}
          skip_files = {'System/Interface/Animation/LoomEngine.py'}
          suffixes = {'.py', '.txt'}

          moved_to_widgets_in_qt5 = {
              'QAction',
              'QActionGroup',
              'QFileSystemModel',
              'QShortcut',
              'QUndoCommand',
              'QUndoGroup',
              'QUndoStack'
          }

          import_block_pattern = re.compile(
              r'from\s+PyQt5\.(QtGui|QtWidgets)\s+import\s+\(([^)]*)\)',
              re.DOTALL
          )

          def parse_names(block_text):
              names = [name.strip() for name in block_text.split(',')]
              return [name for name in names if name]

          def format_block(module_name, names):
              if not names:
                  return ''

              ordered_names = sorted(names, key = len)
              body           = ',\n    '.join(ordered_names)

              return f'from PyQt5.{module_name} import (\n    {body}\n)'

          def fix_moved_symbols(text):
              matches = list(import_block_pattern.finditer(text))

              if not matches:
                  return text

              gui_names     = []
              widgets_names = []
              gui_match     = None
              widgets_match = None

              for match in matches:
                  module_name, block_text = match.group(1), match.group(2)
                  names                   = parse_names(block_text)

                  if module_name == 'QtGui':
                      gui_names = names
                      gui_match = match

                  elif module_name == 'QtWidgets':
                      widgets_names = names
                      widgets_match = match

              if gui_match is None:
                  return text

              moved = [name for name in gui_names if name in moved_to_widgets_in_qt5]

              if not moved:
                  return text

              remaining_gui_names  = [name for name in gui_names if name not in moved_to_widgets_in_qt5]
              merged_widgets_names = widgets_names + [name for name in moved if name not in widgets_names]

              new_gui_block     = format_block('QtGui', remaining_gui_names)
              new_widgets_block = format_block('QtWidgets', merged_widgets_names)

              if widgets_match is not None:
                  replacements = sorted(
                      [(gui_match.span(), new_gui_block), (widgets_match.span(), new_widgets_block)],
                      key     = lambda item: item[0][0],
                      reverse = True
                  )

                  for span, replacement in replacements:
                      text = text[:span[0]] + replacement + text[span[1]:]

              else:
                  replacement = f'{new_widgets_block}\n\n{new_gui_block}' if new_gui_block else new_widgets_block
                  text        = text[:gui_match.span()[0]] + replacement + text[gui_match.span()[1]:]

              return text

          for path in root.rglob('*'):
              if any(part in skip_dirs for part in path.parts):
                  continue

              if not path.is_file() or path.suffix.lower() not in suffixes:
                  continue

              relative_path = path.relative_to(root).as_posix()

              if relative_path in skip_files:
                  continue

              text = path.read_text(encoding='utf-8')

              # Сначала меняем специфичный для Qt6 импорт OpenGL-виджета на корректный для Qt5
              updated = text.replace('from PyQt6.QtOpenGLWidgets import QOpenGLWidget', 'from PyQt5.QtWidgets import QOpenGLWidget')

              # Затем проводим общую замену регистров PyQt6 -> PyQt5
              updated = updated.replace('PyQt6', 'PyQt5').replace('pyqt6', 'pyqt5')

              # Переносим символы, сменившие модуль между Qt5 и Qt6 (QtGui -> QtWidgets)
              updated = fix_moved_symbols(updated)

              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  print(relative_path)
          PY

      - name: Setup Venv and Install Project
        shell: bash
        run: |
          python -m venv venv
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi

          if [ "$QT_BINDING" == "pyqt5" ]; then
            pip install PyQt5
          else
            pip install PyQt6
          fi

          pip install aubio/dist/*.whl
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile Pythran Modules
        shell: bash
        env:
          PYTHONUTF8: 1
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
            PYTHRAN_EXT=".pyd";
          else
            source venv/bin/activate
            PYTHRAN_EXT=".so";
          fi

          for file in System/Accelerated/*.py; do
            if grep -q "pythran export" "$file"; then
              FILENAME=$(basename "$file" .py)
              DIR_NAME=$(dirname "$file")

              pythran "$file" -o "$DIR_NAME/$FILENAME$PYTHRAN_EXT"
            fi
          done

      - name: Cleanup unnecessary files
        shell: bash
        run: |
          all_targets="linux-x64 linux-arm64 windows-x64 windows-arm64 macos-intel macos-silicon"

          for target in $all_targets; do
            if [ "$target" != "${{ matrix.artifact_name }}" ]; then
              rm -f "System/ADB/adb-$target" "System/ADB/adb-$target.exe"
              rm -f "System/FFmpeg/ffmpeg-$target" "System/FFmpeg/ffmpeg-$target.exe"
              rm -f "System/FFmpeg/ffprobe-$target" "System/FFmpeg/ffprobe-$target.exe"
            fi
          done

          if [ "${{ runner.os }}" != "Windows" ]; then
            rm -f System/ADB/AdbWinApi.dll
            rm -f System/ADB/AdbWinUsbApi.dll
          fi

          rm -f System/ADB/CassetteReceiver.apk

      - name: Run PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi

          pyinstaller --noconfirm cassette.spec

      - name: Deduplicate identical files via hardlinks
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import os
          from collections import defaultdict

          root = 'dist/Cassette'
          hash_to_paths = defaultdict(list)

          for dirpath, dirnames, filenames in os.walk(root):
              for filename in filenames:
                  full_path = os.path.join(dirpath, filename)

                  if os.path.islink(full_path):
                      continue

                  with open(full_path, 'rb') as file_handle:
                      digest = hashlib.sha256(file_handle.read()).hexdigest()

                  hash_to_paths[digest].append(full_path)

          saved_bytes  = 0
          linked_count = 0

          for digest, paths in hash_to_paths.items():
              if len(paths) < 2:
                  continue

              canonical_path = paths[0]
              file_size      = os.path.getsize(canonical_path)

              for duplicate_path in paths[1:]:
                  os.remove(duplicate_path)
                  os.link(canonical_path, duplicate_path)
                  saved_bytes  += file_size
                  linked_count += 1

          print(f'Hardlinked {linked_count} duplicate files, saved {saved_bytes / (1024*1024):.1f} MB on disk')
          PY

      - name: Package artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" == "macOS" ]; then
            zip -r -y "../cassette-${{ matrix.artifact_name }}-${{ env.QT_BINDING }}.zip" .
          elif [ "${{ runner.os }}" == "Windows" ]; then
            7z a -mx=5 "../cassette-${{ matrix.artifact_name }}-${{ env.QT_BINDING }}.zip" Cassette
          else
            tar czf "../cassette-${{ matrix.artifact_name }}-${{ env.QT_BINDING }}.tar.gz" Cassette
          fi
          ls -lh ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cassette-${{ matrix.artifact_name }}-${{ env.QT_BINDING }}
          path: |
            cassette-${{ matrix.artifact_name }}-${{ env.QT_BINDING }}.tar.gz
            cassette-${{ matrix.artifact_name }}-${{ env.QT_BINDING }}.zip
          include-hidden-files: true

  publish-draft-release:
    name: Publish draft release
    needs: build
    if: ${{ inputs.upload_to_draft_release == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          version_value=$(cat version | tr -d '[:space:]')
          echo "value=$version_value" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cassette-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded assets
        shell: bash
        run: ls -lh release-assets

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Cassette v${{ steps.version.outputs.value }}
          draft: true
          files: release-assets/*
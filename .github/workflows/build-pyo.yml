name: Build Pyo

on:
  workflow_dispatch:

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install portaudio libsndfile fftw liblo portmidi
      
      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg.exe install portaudio fftw3 libsndfile portmidi

      - name: Clone pyo
        run: |
          git clone https://github.com/belangeo/pyo.git
          cd pyo
          git submodule update --init --recursive

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      # Linux build
      - name: Build wheels (Linux, Python 3.10)
        if: runner.os == 'Linux'
        run: cibuildwheel pyo --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-*"
          CIBW_SKIP: "pp* *-musllinux*"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_BUILD: >
            yum install -y
            portaudio-devel
            alsa-lib-devel
            jack-audio-connection-kit-devel
            libsndfile-devel
            fftw-devel
            liblo-devel
            portmidi-devel

      # macOS & Windows build
      - name: Build wheels (Python 3.10)
        if: runner.os != 'Linux'
        run: cibuildwheel pyo --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-*"
          CIBW_SKIP: "pp* *-musllinux*"

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyo-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

name: Build macOS App with aubio

on:
  workflow_dispatch:

jobs:
  build_aubio_and_app:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install cibuildwheel
        run: pip install --upgrade pip cibuildwheel

      - name: Clone aubio
        run: |
          git clone https://github.com/aubio/aubio.git
          cd aubio
          git submodule update --init --recursive

      - name: Build aubio wheel for macOS
        run: |
          cd aubio
          cibuildwheel . --output-dir ../wheelhouse --platform macos
        env:
          CIBW_BUILD: "cp310-*"
          CIBW_SKIP: "*-pp* *-musllinux*"

      - name: Install project dependencies including aubio
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install wheelhouse/*.whl
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build project with PyInstaller
        run: |
          source venv/bin/activate
          pyinstaller --onedir --add-data version:. --add-data System:System --hidden-import OpenGL Cassette.py

      - name: Upload aubio wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aubio-wheel-macos
          path: wheelhouse/*.whl

      - name: Upload app/exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*

name: Build Cassette Cross-Platform

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            sep: ":"
          - os: windows-latest
            artifact_name: win-x64
            sep: ";"
          - os: macos-13 # Intel
            artifact_name: macos-intel
            sep: ":"
          - os: macos-latest # Apple Silicon
            artifact_name: macos-silicon
            sep: ":"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Шаг 1: Клонируем и собираем aubio
      - name: Clone and build aubio
        run: |
          git clone https://github.com/aubio/aubio.git
          cd aubio
          pip install wheel setuptools
          python setup.py bdist_wheel
          cd ..

      # Шаг 2: Создание venv и установка зависимостей
      - name: Setup Virtual Environment and Install Deps
        shell: bash
        run: |
          python -m venv venv
          # Активация venv зависит от ОС
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          
          # Установка собранного aubio
          pip install aubio/dist/*.whl
          
          # Установка остальных требований
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
          pip install pyinstaller

      # Шаг 3: Сборка через PyInstaller
      - name: Run PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          
          # Используем матричную переменную ${{ matrix.sep }} для кроссплатформенных путей
          pyinstaller --onedir \
            --add-data "version${{ matrix.sep }}." \
            --add-data "System${{ matrix.sep }}System" \
            --hidden-import OpenGL \
            --noconfirm \
            --windowed \
            Cassette.py

      # Шаг 4: Загрузка артефактов
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Cassette/
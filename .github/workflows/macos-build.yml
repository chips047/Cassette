name: Build aubio wheels + PyInstaller (macOS / Windows / Linux)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x86_64
            runs_on: ubuntu-latest
            platform: linux
            cibw_archs: "x86_64"
          - id: linux-aarch64
            runs_on: ubuntu-24.04-arm
            platform: linux
            cibw_archs: "aarch64"
          - id: windows-x86_64
            runs_on: windows-latest
            platform: windows
            cibw_archs: "x86_64"
          - id: macos-x86_64
            runs_on: macos-14
            platform: macos
            cibw_archs: "x86_64"
          - id: macos-arm64
            runs_on: macos-14-arm64
            platform: macos
            cibw_archs: "arm64"
          - id: macos-universal2
            runs_on: macos-14
            platform: macos
            cibw_archs: "x86_64,arm64"
            cibw_macos_universal2: "1"

    runs-on: ${{ matrix.runs_on }}
    name: Build on ${{ matrix.id }}

    env:
      # Python target (отредактируй если нужно другие версии)
      CIBW_BUILD: "cp310-*"
      CIBW_SKIP: "*-pp* *-musllinux*"
      WHEELHOUSE_DIR: wheelhouse
      # эти переменные заполняются из матрицы дальше
      CIBW_ARCHS: ${{ matrix.cibw_archs }}
      CIBW_MACOS_UNIVERSAL2: ${{ matrix.cibw_macos_universal2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system build tools (Linux/macOS)  # Windows step below handles its own toolchain
        if: matrix.platform != 'windows'
        run: |
          # Нужные системные зависимости для сборки aubio могут отличаться — добавляем базовые инструменты
          if [ "${{ matrix.platform }}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y build-essential git pkg-config autoconf automake libtool python3-dev
          fi

      - name: Clone aubio
        run: |
          git clone --depth 1 https://github.com/aubio/aubio.git aubio-src
          cd aubio-src
          git submodule update --init --recursive || true

      - name: Build aubio wheel with cibuildwheel
        run: |
          # Устанавливаем cibuildwheel в окружение runner'а и запускаем его внутри клона aubio
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cibuildwheel==2.*
          cd aubio-src
          # запуск cibuildwheel в директории aubio — он найдёт setup.py / pyproject.toml
          python -m cibuildwheel . --output-dir ../${{ env.WHEELHOUSE_DIR }} --platform ${{ matrix.platform }}
        env:
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_ARCHS: ${{ env.CIBW_ARCHS }}
          CIBW_MACOS_UNIVERSAL2: ${{ env.CIBW_MACOS_UNIVERSAL2 }}
          CIBW_SKIP: ${{ env.CIBW_SKIP }}

      - name: List wheels
        run: |
          ls -la ${{ env.WHEELHOUSE_DIR }} || true

      - name: Create venv and install aubio wheel + requirements (Linux / macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          if ls ${{ env.WHEELHOUSE_DIR }}/*.whl 1> /dev/null 2>&1; then
            python -m pip install ${{ env.WHEELHOUSE_DIR }}/*.whl
          fi
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Create venv and install aubio wheel + requirements (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          $wh = Get-ChildItem -Path "${{ github.workspace }}\wheelhouse" -Filter *.whl -ErrorAction SilentlyContinue
          if ($wh) { python -m pip install ${wh.FullName} }
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }
          python -m pip install pyinstaller

      - name: Run PyInstaller (Linux / macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          source venv/bin/activate
          # Подставь имя главного скрипта / опции PyInstaller под свой проект
          pyinstaller --onedir \
            --add-data "version:version" \
            --add-data "System:System" \
            --hidden-import OpenGL \
            Cassette.py

      - name: Run PyInstaller (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          .\venv\Scripts\Activate.ps1
          # На Windows синтаксис --add-data: "src;dest"
          pyinstaller --onedir --add-data "version;." --add-data "System;System" --hidden-import OpenGL Cassette.py

      - name: Upload aubio wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.id }}
          path: ${{ env.WHEELHOUSE_DIR }}/*.whl

      - name: Upload PyInstaller build (dist)
        uses: actions/upload-artifact@v4
        with:
          name: app-dist-${{ matrix.id }}
          path: dist/**

      - name: Cleanup dist for next job
        if: always()
        run: |
          rm -rf dist build __pycache__ || true

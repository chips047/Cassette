name: Build wheels + PyInstaller (macOS / Windows / Linux)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-package:
    # matrix: разные раннеры + параметры для cibuildwheel
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - id: linux-x86_64
            runs_on: ubuntu-latest
            platform: linux
            cibw_archs: "x86_64"
          # Linux aarch64 (github предоставляет некоторые arm runners like ubuntu-24.04-arm)
          - id: linux-aarch64
            runs_on: ubuntu-24.04-arm
            platform: linux
            cibw_archs: "aarch64"
          # Windows x86_64
          - id: windows-x86_64
            runs_on: windows-latest
            platform: windows
            cibw_archs: "x86_64"
          # Windows arm64 (if available)
          - id: windows-arm64
            runs_on: windows-11-arm
            platform: windows
            cibw_archs: "arm64"
          # macOS Intel
          - id: macos-x86_64
            runs_on: macos-14
            platform: macos
            cibw_archs: "x86_64"
          # macOS Apple Silicon (arm64)
          - id: macos-arm64
            runs_on: macos-14-arm64
            platform: macos
            cibw_archs: "arm64"
          # macOS universal2 (one wheel that contains both archs)
          - id: macos-universal2
            runs_on: macos-14
            platform: macos
            cibw_archs: "x86_64,arm64"
            cibw_macos_universal2: "1"

    runs-on: ${{ matrix.runs_on }}
    name: Build on ${{ matrix.id }}
    env:
      # собираем только для CPython 3.10 (как в твоём исходном файле) — поменяй при желании
      CIBW_BUILD: "cp310-*"
      # пропуски (подправь если нужно)
      CIBW_SKIP: "*-pp* *-musllinux*"
      # использую переменную из матрицы; у macOS-universal2 тоже установлено cibw_archs
      CIBW_ARCHS: ${{ matrix.cibw_archs }}
      # пустая строка для большинства; задана только для macos-universal2
      CIBW_MACOS_UNIVERSAL2: ${{ matrix.cibw_macos_universal2 }}
      # путь вывода wheel'ов
      WHEELHOUSE_DIR: wheelhouse

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (needed to run pip/cibuildwheel wrapper)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install build tools (pip, cibuildwheel)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cibuildwheel==2.*  # фиксируем major версию (при желании можно убрать)

      - name: Build wheels with cibuildwheel
        # используем сам pip-инсталлер cibuildwheel; можно заменить на uses: pypa/cibuildwheel@v2
        run: |
          python -m cibuildwheel --platform ${{ matrix.platform }} --output-dir $WHEELHOUSE_DIR
        # если нужно использовать action вместо прямого вызова, можно заменить на uses: pypa/cibuildwheel@v2

      - name: List built wheels
        run: ls -la $WHEELHOUSE_DIR || true

      - name: Create venv and install app + dependencies
        shell: bash
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          # установим собранные wheel'ы (если есть)
          if ls $WHEELHOUSE_DIR/*.whl 1> /dev/null 2>&1; then
            python -m pip install $WHEELHOUSE_DIR/*.whl
          fi
          # установим requirements проекта (если есть)
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build with PyInstaller (macOS / Linux)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          source venv/bin/activate
          # Пример: адаптируй имя главного скрипта — у тебя в исходном был Cassette.py
          pyinstaller --onedir --add-data version:. --add-data System:System --hidden-import OpenGL Cassette.py || true
        continue-on-error: false

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          if (Test-Path "$env:GITHUB_WORKSPACE\wheelhouse\*.whl") {
            python -m pip install $env:GITHUB_WORKSPACE\wheelhouse\*.whl
          }
          if (Test-Path "$env:GITHUB_WORKSPACE\requirements.txt") {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller
          # Windows: аналог параметров, путь к дополнительным данным может отличаться
          pyinstaller --onedir --add-data "version;." --add-data "System;System" --hidden-import OpenGL Cassette.py

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.id }}
          path: ${{ env.WHEELHOUSE_DIR }}/*.whl

      - name: Upload PyInstaller dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dist-${{ matrix.id }}
          path: dist/**


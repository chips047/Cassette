name: Build macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          # Если у тебя есть whl файл для macOS в корне
          pip install aubio
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          # Собираем onefile, можно изменить на onedir если нужно
          pyinstaller --onedir --add-data version:. --add-data System:System --hidden-import OpenGL Cassette.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*

name: Build Cassette Cross-Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
            sep: ":"
          - os: windows-latest
            artifact_name: win-x64
            sep: ";"
          - os: macos-15-intel
            artifact_name: macos-intel
            sep: ":"
          - os: macos-latest
            artifact_name: macos-silicon
            sep: ":"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Ускоряет повторные запуски

      # Шаг 1: Установка системных зависимостей (только для Linux)
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      # Шаг 2: Подготовка окружения для сборки колеса aubio
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel setuptools numpy # Numpy КРИТИЧЕН здесь для компиляции aubio

      # Шаг 3: Клонирование и сборка aubio
      - name: Clone and build aubio
        run: |
          git clone https://github.com/aubio/aubio.git
          cd aubio
          python setup.py bdist_wheel
          cd ..

      # Шаг 4: Создание venv и установка всего проекта
      - name: Setup Venv and Install Project
        shell: bash
        run: |
          python -m venv venv
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          
          # Устанавливаем собранное колесо
          pip install aubio/dist/*.whl
          
          # Устанавливаем зависимости приложения
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
          pip install pyinstaller

      # Шаг 5: Сборка через PyInstaller
      - name: Run PyInstaller
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          
          pyinstaller --onedir --windowed \
            --add-data "version${{ matrix.sep }}." \
            --add-data "System${{ matrix.sep }}System" \
            --hidden-import OpenGL \
            --noconfirm \
            Cassette.py

      # Шаг 6: Загрузка артефактов
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Cassette/